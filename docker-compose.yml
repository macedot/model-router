services:
  model-router:
    image: ghcr.io/macedot/model-router:latest
    container_name: model-router
    ports:
      - "12345:12345"
    environment:
      - API_KEY_MINIMAX=${API_KEY_MINIMAX}
      - API_KEY_OPENCODE=${API_KEY_OPENCODE}
      - API_KEY_ZAI=${API_KEY_ZAI}
    env_file:
      - .env
    volumes:
      - ./config.json:/app/config.json:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
